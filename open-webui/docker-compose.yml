services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: factory-open-webui
    ports:
      - "3006:8080"
    environment:
      - OPENAI_API_BASE_URL=http://pipelines:9099
      - OPENAI_API_KEY=factory-ai-key
      - DEFAULT_USER_ROLE=user
      - ENABLE_SIGNUP=true
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - pipelines
    restart: unless-stopped

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: factory-pipelines
    ports:
      - "9099:9099"
    environment:
      - DIFY_API_URL=http://host.docker.internal       # Dify 서버 (로컬)
      - DIFY_API_KEY=app-factoryai2026                  # Dify Chatflow API 키
      - PIPELINES_API_KEY=factory-ai-key
    volumes:
      - ./pipelines:/app/pipelines
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data:
